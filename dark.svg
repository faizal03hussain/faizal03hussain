<svg width="1180" height="610" viewBox="0 0 1180 610" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(8px); }
        }
        @keyframes scanlineAnim {
            0% { transform: translateY(0px); }
            50% { transform: translateY(530px); }
            100% { transform: translateY(0px); }
        }
        @keyframes blinkAnim {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        @keyframes role0 {
            0%, 22% { opacity: 1; }
            25%, 100% { opacity: 0; }
        }
        @keyframes role1 {
            0%, 24% { opacity: 0; }
            25%, 47% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        @keyframes role2 {
            0%, 49% { opacity: 0; }
            50%, 72% { opacity: 1; }
            75%, 100% { opacity: 0; }
        }
        @keyframes role3 {
            0%, 74% { opacity: 0; }
            75%, 98% { opacity: 1; }
            100% { opacity: 0; }
        }
        .ascii-float { animation: floatAnim 6s ease-in-out infinite; }
        .scanline { animation: scanlineAnim 8s linear infinite; }
        .cursor { animation: blinkAnim 0.8s infinite; }
        .role-0 { animation: role0 12s infinite; }
        .role-1 { animation: role1 12s infinite; }
        .role-2 { animation: role2 12s infinite; }
        .role-3 { animation: role3 12s infinite; }
    
        </style>
        <linearGradient id="ascii_grad_dark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7C3AED" />
            <stop offset="50%" stop-color="#22D3EE" />
            <stop offset="100%" stop-color="#10B981" />
        </linearGradient>
        <radialGradient id="bg_grad_dark" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.12" />
            <stop offset="100%" stop-color="#030712" stop-opacity="1" />
        </radialGradient>
        <clipPath id="canvas_clip">
            <rect width="1180" height="610" rx="16" />
        </clipPath>
